    position:relative;

    height:600px;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    overflow:hidden;

    background:

    linear-gradient(rgba(10,7,4,.55),rgba(10,7,4,.75)),

    url("https://cdn.observatoriodocinema.com.br/2024/07/The_Legend_of_Vox_Machina-1024x576.jpg");

    background-size:cover;
    background-position:center;

}

header::before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:

radial-gradient(circle,transparent 20%,rgba(0,0,0,.45));

}

header::after{
   header div{

position:relative;
z-index:2;

}

header h1{

font-family:'Cinzel',serif;

font-size:6rem;

letter-spacing:10px;

color:#f8df9c;

text-shadow:

0 0 10px black,
0 0 25px black,
0 0 45px black;

margin-bottom:20px;

}

header p{

font-size:1.5rem;

color:#efe3c5;

letter-spacing:3px;

}
    nav{

position:sticky;
top:0;

display:flex;
justify-content:center;
align-items:center;
gap:40px;

padding:18px;

background:rgba(20,12,8,.95);

backdrop-filter:blur(12px);

border-top:2px solid #8e6d3f;
border-bottom:2px solid #8e6d3f;

z-index:1000;

}

nav a{

font-family:'Cinzel',serif;

font-size:17px;

color:#e8d49b;

text-decoration:none;

letter-spacing:1px;

transition:.35s;

position:relative;

}

nav a::after{

content:"";

position:absolute;

left:50%;
bottom:-8px;

width:0;
height:2px;

background:#e7c76b;

transition:.35s;

transform:translateX(-50%);

}

nav a:hover{

color:white;

}

nav a:hover::after{

width:100%;

}
    main{

width:min(1250px,92%);

margin:70px auto;

padding:70px;

background:rgba(15,12,10,.72);

backdrop-filter:blur(10px);

border:2px solid #8d6737;

border-radius:18px;

box-shadow:

0 0 60px rgba(0,0,0,.55);

}
    section{

margin:90px 0;

}

h2{

font-family:'Cinzel',serif;

font-size:2.8rem;

text-align:center;

color:#f1d48a;

margin-bottom:35px;

letter-spacing:2px;

}

h2::after{

content:"";

display:block;

width:180px;

height:3px;

margin:18px auto;

background:linear-gradient(to right,transparent,#caa65d,transparent);

}

p{

font-size:22px;

line-height:1.9;

text-align:justify;

color:#ece6d7;

margin-bottom:28px;
