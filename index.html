<!DOCTYPE html>
<html lang="pt-BR">
  </head>

   <style>
     *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'EB Garamond',serif;
    background:#120d08;
    color:white;
}
     header{
       <nav>

<a href="#exandria">Exandria</a>

<a href="#taldorei">Tal'Dorei</a>

<a href="#personagens">Vox Machina</a>

<a href="#vestigios">Vestígios</a>

<a href="#conclave">Conclave</a>

<a href="#curiosidades">Curiosidades</a>

</nav>
    height:600px;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:
    linear-gradient(rgba(10,7,4,.55),rgba(10,7,4,.75)),
    url("https://cdn.observatoriodocinema.com.br/2024/07/The_Legend_of_Vox_Machina-1024x576.jpg");

    background-size:cover;
    background-position:center;
}
     header h1{
    font-family:'Cinzel',serif;
    font-size:6rem;
    color:#f5d891;
    letter-spacing:10px;
    text-shadow:
    0 0 10px black,
    0 0 25px black,
    0 0 50px black;
}
     header p{
    margin-top:20px;
    font-size:1.4rem;
    color:#eee0bc;
}
     nav{
    position:sticky;
    top:0;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;

    padding:18px;

    background:rgba(20,12,8,.95);

    backdrop-filter:blur(12px);

    border-top:2px solid #8d6737;
    border-bottom:2px solid #8d6737;

    z-index:1000;
}
     nav a{
    font-family:'Cinzel',serif;
    color:#f2d78b;
    text-decoration:none;
    font-size:18px;
    letter-spacing:1px;
    transition:.3s;
}
     nav a:hover{
    color:white;
}
     nav a::after{
    content:"";

    display:block;

    width:0;

    height:2px;

    margin:auto;
    margin-top:6px;

    background:#d9b56c;

    transition:.3s;
}
     nav a:hover::after{
    width:100%;
}
</style>

</head>

</html>
