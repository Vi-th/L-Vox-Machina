<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Lenda de Vox Machina | Biblioteca de Emon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{

    font-family:'EB Garamond',serif;
    color:#f2ece0;

    background:
    linear-gradient(rgba(18,12,8,.88),rgba(18,12,8,.94)),
    url("https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=2200&q=80");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

}

header{

    position:relative;

    height:600px;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    overflow:hidden;

    background:

    linear-gradient(rgba(10,7,4,.55),rgba(10,7,4,.75)),

    url("https://cdn.observatoriodocinema.com.br/2024/07/The_Legend_of_Vox_Machina-1024x576.jpg");

    background-size:cover;
    background-position:center;

}

header::before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:

radial-gradient(circle,transparent 20%,rgba(0,0,0,.45));

}

header::after{
   header div{

position:relative;
z-index:2;

}

header h1{

font-family:'Cinzel',serif;

font-size:6rem;

letter-spacing:10px;

color:#f8df9c;

text-shadow:

0 0 10px black,
0 0 25px black,
0 0 45px black;

margin-bottom:20px;

}

header p{

font-size:1.5rem;

color:#efe3c5;

letter-spacing:3px;

}

content:"";

position:absolute;

bottom:0;
left:0;

width:100%;
height:6px;

background:

linear-gradient(
to right,
#3d2209,
#b68b4c,
#f0d28f,
#b68b4c,
#3d2209
);

}
